<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="20" ry="20" fill="#202c62"/>
  <!-- Back mountain (green) -->
  <polygon points="55,20 95,80 15,80" fill="#1c9c3e" opacity="0.85"/>
  <!-- Front mountain (navy outline / lighter blue) -->
  <polygon points="38,35 72,80 4,80" fill="#1c10a0"/>
  <!-- Snow cap / north highlight -->
  <polygon points="38,35 50,58 26,58" fill="#ffffff" opacity="0.9"/>
  <!-- Small north arrow at top -->
  <polygon points="38,35 44,48 32,48" fill="#00c06c"/>
</svg>
